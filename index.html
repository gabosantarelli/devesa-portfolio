/* ── SMART MERGE ──
 * USER fields (preserved from localStorage): rag, pct, pri, notes, phases, links, gs, ge, gb, acts[].dn
 * TASK fields (taken from fresh INIT): ups, risk, ms, pn, n, pm, new acts
 * Actions merge: match by text (t). Keep user dn. Add new INIT acts. Keep user-created acts.
 */
function mergeActs(initActs,savedActs){
  var merged=initActs.map(function(ia){
    var m=savedActs.find(function(sa){return sa.t===ia.t});
    if(m){ia.dn=m.dn;} /* preserve user's done flag */
    return ia;
  });
  /* keep user-created actions (in saved but not in INIT) */
  savedActs.forEach(function(sa){
    if(!initActs.find(function(ia){return ia.t===sa.t})){merged.push(sa);}
  });
  return merged;
}

function load(){
  var stored=null,storedV=null;
  try{
    var raw=localStorage.getItem(SK);
    if(!raw)raw=localStorage.getItem("devesa-v52-gh");
    if(!raw)raw=localStorage.getItem("devesa-v51-gh");
    if(!raw)raw=localStorage.getItem("devesa-v5-gh");
    if(raw){
      var parsed=JSON.parse(raw);
      if(parsed&&parsed._v){storedV=parsed._v;stored=parsed.d;}
      else if(Array.isArray(parsed)&&parsed.length>0){storedV=null;stored=parsed;}
    }
  }catch(e){}

  if(!stored||!stored.length){
    /* No localStorage → use INIT as-is */
    P=JSON.parse(JSON.stringify(INIT));save();return;
  }

  if(storedV===INIT_V){
    /* Same version → localStorage is up-to-date, just use it */
    P=stored.map(function(proj){
      if(!proj.notes)proj.notes=[];
      if(!proj.links)proj.links=[];
      if(!proj.phases)proj.phases=[];
      return proj;
    });
    return;
  }

  /* Version mismatch → SMART MERGE */
  console.log("[DEVESA] Merge: INIT "+INIT_V+" vs stored "+(storedV||"legacy"));
  P=INIT.map(function(init){
    var proj=JSON.parse(JSON.stringify(init)); /* start with fresh INIT */
    var saved=stored.find(function(x){return x.id===init.id});
    if(!saved)return proj; /* new project, no user data */

    /* USER-edited fields: take from localStorage */
    proj.rag=saved.rag||init.rag;
    proj.pct=(saved.pct!==undefined)?saved.pct:init.pct;
    proj.pri=(saved.pri!==undefined)?saved.pri:init.pri;
    proj.notes=saved.notes||[];
    proj.links=saved.links||[];
    /* Phases: always prefer user version (user reorders, adds, edits) */
    if(saved.phases&&saved.phases.length>0)proj.phases=saved.phases;
    /* Dates: keep user's if they set them, but if INIT has new dates and user had none, use INIT */
    if(saved.gs)proj.gs=saved.gs; if(saved.ge)proj.ge=saved.ge; if(saved.gb)proj.gb=saved.gb;

    /* TASK-updated fields: always take from fresh INIT (already in proj) */
    /* ups, risk, ms, pn, n, pm → already from init */

    /* Smart merge actions */
    proj.acts=mergeActs(init.acts,saved.acts||[]);

    return proj;
  });

  /* Keep user-created projects (in localStorage but not in INIT) */
  stored.forEach(function(s){
    if(!P.find(function(x){return x.id===s.id})){P.push(s);}
  });

  save(); /* persist merged state */
}

}

  var initRe=/var INIT=\[[\s\S]*?\];/;
  if(!initRe.test(html)){showToast('⚠️ No se pudo exportar — INIT no encontrado','#DC2626');return;}
  html=html.replace(initRe,newINIT);

  var dd=String(today.getDate()).padStart(2,'0'),mm=String(today.getMonth()+1).padStart(2,'0'),yy=today.getFullYear();

  html=html.replace(/var TD=new Date\("[^"]*"\)/,'var TD=new Date("'+td+'")');

  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
