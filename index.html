let P,cv="exec",cf="all",oi=new Set(["ING-21"]),pnOn=true;

function load(){try{const s=localStorage.getItem(SK);if(s){const d=JSON.parse(s);if(Array.isArray(d)&&d.length>0){P=d;return;}}}catch(e){}P=JSON.parse(JSON.stringify(INIT));}
function save(){try{localStorage.setItem(SK,JSON.stringify(P))}catch(e){}}
function resetAll(){P=JSON.parse(JSON.stringify(INIT));save();R();}

load();

function V(v){cv=v;document.querySelectorAll('.nb').forEach(b=>b.classList.remove('a'));document.getElementById('b-'+v)?.classList.add('a');R()}
function R(){pnOn=document.getElementById('pnT').checked;document.getElementById('app').innerHTML=render()}
function tgl(id){oi.has(id)?oi.delete(id):oi.add(id);R()}
function expA(ids){ids.forEach(i=>oi.add(i));R()}
function cycleRag(id,e){e.stopPropagation();const p=P.find(x=>x.id===id);if(!p)return;const i=RO.indexOf(p.rag);p.rag=RO[(i+1)%RO.length];save();R();}
function toggleAct(pid,ai){const p=P.find(x=>x.id===pid);if(!p||!p.acts[ai])return;p.acts[ai].dn=p.acts[ai].dn?0:1;save();R();}
function setPct(pid,v){const p=P.find(x=>x.id===pid);if(!p)return;p.pct=Math.max(0,Math.min(100,parseInt(v)||0));save();R();}
function addNote(pid){const inp=document.getElementById('ni-'+pid);if(!inp||!inp.value.trim())return;const p=P.find(x=>x.id===pid);if(!p)return;if(!p.notes)p.notes=[];p.notes.push({t:inp.value.trim(),d:new Date().toLocaleDateString("es-AR")});inp.value='';save();R();}
function noteKey(pid,e){if(e.key==='Enter')addNote(pid);}

function dF(d){if(!d)return null;return Math.ceil((new Date(d)-TD)/864e5)}
function fD(d){if(!d)return"—";const t=new Date(d);return String(t.getDate()).padStart(2,'0')+'/'+String(t.getMonth()+1).padStart(2,'0')}
function bg(r,click){const c=RC[r]||RC.blue;const oc=click?` onclick="${click}"`:'';return`<span class="bd" style="background:${c.b}"${oc}>${c.l}${click?' ▾':''}</span>`}
function pb(pct,col){return`<div class="pb"><div class="pf" style="width:${Math.min(pct,100)}%;background:${col}"></div></div>`}

function card(p){
  const rc=RC[p.rag]||RC.blue,d=dF(p.md),ov=d!==null&&d<0,ur=d!==null&&d>=0&&d<=7;
  const isO=oi.has(p.id),esc=p.risk.includes("Escalado"),doneN=(p.acts||[]).filter(a=>a.dn).length;
  let h=`<div class="pc${isO?' op':''}" style="border-left:4px solid ${rc.b}">`;
  h+=`<div class="ch" onclick="tgl('${p.id}')">`;
  h+=bg(p.rag,`cycleRag('${p.id}',event)`);
  h+=`<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">`;
  h+=`<span style="font-size:10px;color:#64748B;font-weight:800;font-family:monospace">${p.id}</span>`;
  h+=`<span style="font-size:13px;font-weight:700">${p.n}</span>`;
  if(esc)h+=`<span style="font-size:9px;background:#D9770633;color:#FDE68A;padding:1px 5px;border-radius:8px">📢 Escalado</span>`;
  h+=`</div><div style="font-size:10px;color:#64748B;margin-top:2px">PM: ${PPL[p.pm]||'—'} · ${p.pct}%`;
  if(doneN>0)h+=` <span style="color:#10B981">· ${doneN}/${p.acts.length} ✓</span>`;
  h+=`</div></div>`;
  h+=`<div style="flex:0 0 110px;text-align:right">`;
  if(p.md){const col=ov?"#EF4444":ur?"#F59E0B":"#64748B";const txt=ov?`⚠ VENCIDO ${Math.abs(d)}d`:ur?`⏰ ${d}d`:fD(p.md);h+=`<div style="font-size:10px;font-weight:700;color:${col}">${txt}</div>`}
  h+=`<div style="margin-top:3px">${pb(p.pct,rc.b)}</div></div>`;
  h+=`<span class="ar${isO?' op':''}">▾</span></div>`;

  if(isO){
    h+=`<div class="cb">`;
    // Slider
    h+=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px"><span style="font-size:10px;color:#64748B">Avance:</span><input type="range" class="sl" min="0" max="100" value="${p.pct}" oninput="setPct('${p.id}',this.value)" style="accent-color:${rc.b}"><span style="font-size:11px;font-weight:700;width:35px">${p.pct}%</span></div>`;
    // Private note
    if(pnOn&&p.pn)h+=`<div class="pnb"><div style="font-size:10px;font-weight:700;color:#38BDF8;margin-bottom:4px">💡 NOTA PRIVADA</div><div style="font-size:12px;color:#BAE6FD;line-height:1.5;font-style:italic">${p.pn}</div></div>`;
    h+=`<div class="cg"><div>`;
    h+=`<div class="fl" style="color:#F59E0B">Riesgo</div>`;
    h+=`<div style="font-size:11px;color:#94A3B8;line-height:1.6">${p.risk}</div>`;
    if(p.ms){h+=`<div class="fl" style="color:#3B82F6;margin-top:10px">Próximo Hito</div>`;h+=`<div style="font-size:11px">${p.md?'📅 '+fD(p.md)+' — ':''}${p.ms}</div>`}
    h+=`</div><div>`;
    if(p.acts&&p.acts.length){
      h+=`<div class="fl" style="color:#10B981">Acciones (${doneN}/${p.acts.length})</div>`;
      p.acts.forEach((a,i)=>{
        const isDone=a.dn;
        h+=`<div class="ai${isDone?' dn':''}" onclick="toggleAct('${p.id}',${i})">`;
        h+=`<span style="color:${isDone?'#10B981':a.c?'#EF4444':'#374151'}">${isDone?'✅':a.c?'🔴':'○'}</span>`;
        h+=`<div><div>${a.t}</div><div style="font-size:10px;color:#475569;margin-top:2px">${PPL[a.o]||a.o} · ${a.d}</div></div></div>`;
      });
    }
    h+=`</div></div>`;
    // Updates
    if(p.ups&&p.ups.length){h+=`<div style="margin-top:12px"><div class="fl" style="color:#8B5CF6">Novedades (${LM})</div>`;p.ups.forEach(u=>{h+=`<div style="font-size:10px;color:#64748B;padding:2px 0">• ${u}</div>`});h+=`</div>`}
    // User notes
    if(p.notes&&p.notes.length){h+=`<div style="margin-top:12px"><div class="fl" style="color:#F59E0B">Mis Notas</div>`;p.notes.forEach(n=>{h+=`<div class="nt"><span style="color:#64748B;font-size:10px">${n.d}:</span> ${n.t}</div>`});h+=`</div>`}
    // Add note input
    h+=`<div style="margin-top:10px;display:flex;gap:6px"><input class="ni" id="ni-${p.id}" placeholder="Agregar nota..." onkeydown="noteKey('${p.id}',event)"><button class="nabtn" onclick="addNote('${p.id}')">+ Nota</button></div>`;
    h+=`</div>`;
  }
  h+=`</div>`;return h;
}

function render(){
  const act=P.filter(p=>p.rag!=="done"),cts={};RO.forEach(k=>cts[k]=0);P.forEach(p=>cts[p.rag]++);
  const critN=P.flatMap(p=>p.acts||[]).filter(a=>a.c&&!a.dn).length;
  const top=P.filter(p=>p.pri<=8&&p.rag!=="done");
  const escN=P.filter(p=>p.risk.includes("Escalado")).length;
  let h='';

  // KPIs
  h+=`<div class="kg">`;
  [{v:act.length,l:"Activos",s:cts.done+" cerr.",a:1},{v:cts.orange,l:"🟠 Naranja",s:"Inmediata"},{v:cts.amber,l:"🟡 Amarillo",s:escN+" escalados"},{v:cts.green,l:"🟢 Verde",s:"En camino"},{v:critN,l:"Acción crítica",s:"Pendientes"}].forEach(k=>{
    h+=`<div class="kp${k.a?' ac':''}"><div class="v">${k.v}</div><div class="l">${k.l}</div><div class="s">${k.s}</div></div>`});
  h+=`</div>`;

  if(cv==="exec"){
    h+=`<div class="ab" style="background:#DC262611;border:1px solid #991B1B"><div style="font-size:13px;font-weight:800;color:#FCA5A5;margin-bottom:6px">🚨 FOSS — instalación 20-23/03</div><div style="font-size:11px;color:#FDA4AF;line-height:1.5">Layout definido. Servicios deben estar listos. Tolerancia grasa pendiente Tomás.</div></div>`;
    h+=`<div class="ab" style="background:#1C1917;border:1px solid #78350F"><div style="font-size:13px;font-weight:800;color:#F59E0B;margin-bottom:10px">⚡ DECISIONES REQUERIDAS</div>`;
    DECS.forEach(d=>{const uc=d.u==="INMEDIATA"?"#DC262633":d.u==="ESTA SEMANA"?"#D9770633":"#1E40AF33";const tc=d.u==="INMEDIATA"?"#FCA5A5":d.u==="ESTA SEMANA"?"#FDE68A":"#93C5FD";
      h+=`<div class="dr"><span style="font-family:monospace;color:#F59E0B;font-weight:800;font-size:10px">${d.p}</span><span style="color:#E2E8F0">${d.t}</span><span style="font-size:10px;color:#CBD5E1">${PPL[d.o]}</span><span style="text-align:center;padding:3px 6px;border-radius:4px;font-weight:800;font-size:9px;background:${uc};color:${tc}">${d.u}</span></div>`});
    h+=`</div>`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:13px;font-weight:700;color:#64748B;text-transform:uppercase">Top 8</div><button class="eb" onclick="expA(${JSON.stringify(top.map(p=>p.id))})">Expandir</button></div>`;
    top.forEach(p=>{h+=card(p)});
  }

  else if(cv==="full"){
    const fts=[{k:"all",l:`Todos (${P.length})`},{k:"active",l:`Activos`},{k:"orange",l:`🟠`},{k:"amber",l:`🟡`},{k:"green",l:`🟢`},{k:"done",l:`✅`}];
    h+=`<div class="fb">`;fts.forEach(f=>{h+=`<button class="fbtn${cf===f.k?' a':''}" onclick="cf='${f.k}';R()">${f.l}</button>`});h+=`</div>`;
    let list=cf==="all"?P:cf==="active"?act:P.filter(p=>p.rag===cf);
    list=[...list].sort((a,b)=>a.pri-b.pri);
    list.forEach(p=>{h+=card(p)});
  }

  else if(cv==="agenda"){
    h+=`<div class="mh"><div style="font-size:18px;font-weight:800">🎤 Reunión — ${NM}</div><div style="font-size:12px;color:#93C5FD;margin-top:3px">Todos los gerentes · ~25 min</div></div>`;
    [{n:"1",t:"RESUMEN",c:"#3B82F6",bd:`${act.length} activos. ${cts.orange} naranja. ${cts.amber} amarillo (${escN} escalados). ${cts.green} verde. ${critN} acciones críticas. FOSS 20/03, Nova 20-23/03.`},
     {n:"2",t:"DECISIONES",c:"#EF4444",bd:DECS.map(d=>`${d.p}: ${d.t} (${d.u})`).join("<br>")},
     {n:"3",t:"REPASO TOP 8",c:"#F59E0B",bd:null},
     {n:"4",t:"CIERRE",c:"#10B981",bd:`Compromisos. ¿Servicios FOSS? ¿Anticipo Nova? ${escN} escalados: ¿activos, pausa, cancelados?`}
    ].forEach(s=>{
      h+=`<div class="as" style="border-left:4px solid ${s.c}"><div style="font-size:13px;font-weight:800;color:${s.c};margin-bottom:8px">${s.n}. ${s.t}</div>`;
      if(s.bd)h+=`<div style="font-size:12px;color:#CBD5E1;line-height:1.8">${s.bd}</div>`;
      if(s.n==="3")top.forEach(p=>{
        h+=`<div style="padding:8px 0;border-bottom:1px solid #334155">${bg(p.rag)} <span style="font-size:12px;font-weight:700;margin-left:4px">${p.id} — ${p.n}</span><div style="font-size:11px;color:#94A3B8;margin-top:4px">${p.risk}</div>`;
        if(pnOn&&p.pn)h+=`<div style="background:#0C4A6E22;border-left:3px solid #0369A1;padding:6px 10px;margin-top:4px;font-size:10px;color:#7DD3FC;font-style:italic">💡 ${p.pn}</div>`;
        h+=`</div>`;
      });
      h+=`</div>`;
    });
  }

  h+=`<div style="margin-top:20px;text-align:center;font-size:9px;color:#334155">DEVESA v4 · ✎ Editable · Datos: ${LM}</div>`;
  return h;
}
R();
</script>
