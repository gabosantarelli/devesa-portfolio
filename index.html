function gantt(p){
  if(!p.gs||!p.ge)return'';

  if(total<=0)return'';
  function pos(d){return Math.max(0,Math.min(100,(new Date(d)-start)/total*100))}
  var tP=pos(TD),eP=pos(end),color=(RC[p.rag]||RC.blue).b;
  var h='<div class="gb"><div style="display:flex;justify-content:space-between;font-size:9px;color:#64748B;margin-bottom:3px"><span>'+fD(p.gs)+'</span><span>Hoy</span><span>'+fD(p.ge)+(buf?' (buf '+fD(p.gb)+')':'')+'</span></div>';
  h+='<div class="gbr">';
  if(buf)h+='<div class="gbf" style="left:'+eP+'%;width:'+(100-eP)+'%;background:#78350F44;border-radius:0 4px 4px 0"></div>';
  h+='<div class="gbf" style="width:'+eP+'%;background:'+color+'33"></div>';
  h+='<div class="gbf" style="width:'+Math.min(p.pct,100)+'%;background:'+color+'"></div>';
  h+='<div class="gbl" style="left:'+tP+'%"></div></div>';
  var rows=p.acts.filter(function(a){var pp=a.d.split("/");return pp.length>=2}).map(function(a){var pp=a.d.split("/");return{t:a.t,dn:a.dn,c:a.c,dt:new Date(2026,pp[1]-1,pp[0])}}).sort(function(a,b){return a.dt-b.dt});
  rows.forEach(function(r){
    var w=pos(r.dt),cl=r.dn?'#16A34A':r.c?'#DC2626':'#D97706';
    h+='<div class="gar"><div class="gar-n" style="color:'+(r.dn?'#475569':'#94A3B8')+';'+(r.dn?'text-decoration:line-through':'')+'">'+r.t+'</div><div class="gar-b"><div style="position:absolute;left:0;width:'+w+'%;height:100%;background:'+cl+';border-radius:3px;opacity:'+(r.dn?'0.4':'0.8')+'"></div><div style="position:absolute;left:'+tP+'%;top:-1px;bottom:-1px;width:1px;background:#F1F5F966"></div></div><div class="gar-d">'+fD(r.dt.toISOString())+'</div></div>';
  });
  h+='<div style="font-size:8px;color:#475569;margin-top:3px">│Hoy <span style="color:#16A34A">■OK</span> <span style="color:#DC2626">■Urg</span> <span style="color:#D97706">■Pend</span>'+(buf?' ▒Buf':'')+'</div></div>';
  return h;
}

function ganttPhases(p){
  if(!p.phases||p.phases.length===0)return'';
  var valid=p.phases.filter(function(ph){return ph.s&&ph.e});
  if(valid.length===0)return'';
  var dates=valid.flatMap(function(ph){return[new Date(ph.s),new Date(ph.e)]});
  var minD=new Date(Math.min.apply(null,dates)),maxD=new Date(Math.max.apply(null,dates));
  var total=maxD-minD;if(total<=0)return'';
  function pos(d){return Math.max(0,Math.min(100,(new Date(d)-minD)/total*100))}
  var tP=pos(TD);
  /* Month labels */
  var months=[],cur=new Date(minD.getFullYear(),minD.getMonth(),1);
  while(cur<=maxD){months.push({d:new Date(cur),l:["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][cur.getMonth()]+" "+String(cur.getFullYear()).slice(2)});cur.setMonth(cur.getMonth()+2)}
  var h='<div class="gph">';
  h+='<div class="gph-today" style="left:'+tP+'%"></div>';
  h+='<div class="gph-todaylbl" style="left:'+tP+'%">HOY</div>';
  valid.forEach(function(ph,i){
    var l=pos(ph.s),r=pos(ph.e),w=r-l;
    var done=ph.p===100,col=done?'#6B7280':GPC[i%GPC.length];
    h+='<div class="gph-row">';
    h+='<div class="gph-bar" style="left:'+l+'%;width:'+w+'%;background:'+col+'33;border:1px solid '+col+(done?'66':'')+'">';
    if(ph.p>0)h+='<div class="gph-fill" style="width:'+ph.p+'%;background:'+col+';opacity:'+(done?'0.4':'0.6')+'"></div>';
    h+='<span class="gph-lbl"'+(done?' style="color:#94A3B8;text-decoration:line-through"':'')+'>'+ph.n+(ph.p>0&&ph.p<100?' '+ph.p+'%':'')+'</span>';
    h+='</div></div>';
  });
  h+='<div style="display:flex;justify-content:space-between;padding:2px 0 0;font-size:8px;color:#475569">';
  months.forEach(function(m){h+='<span>'+m.l+'</span>'});
  h+='</div></div>';
  return h;
}

    if(myA.length>0){h+='<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:700;color:#3B82F6;margin-bottom:6px">Tus pendientes ('+myA.length+')</div>';myA.forEach(function(a){h+='<div style="background:#1E293B;border-radius:8px;padding:8px 12px;margin-bottom:3px;display:flex;gap:6px;align-items:center;font-size:11px"><span style="font-size:10px">'+(a.c?'🔴':'⚠️')+'</span><div style="flex:1"><div style="color:#E2E8F0">'+a.t+'</div><div style="font-size:10px;color:#475569">'+a.pid+' · '+a.pn.split("—")[0].trim()+' · '+a.d+'</div></div></div>'});h+='</div>'}
    if(noD.length>0){h+='<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:700;color:#DC2626;margin-bottom:6px">⚠️ Proyectos SIN fechas ('+noD.length+')</div><div style="background:#DC262611;border:1px solid #991B1B;border-radius:10px;padding:10px;margin-bottom:6px;font-size:11px;color:#FCA5A5">Gabriel, definí plazos o marcá como pausados:</div>';noD.forEach(function(p){h+='<div style="background:#1E293B;border-radius:6px;padding:6px 10px;margin-bottom:3px;font-size:11px;display:flex;gap:6px;align-items:center"><span>📢</span><span style="font-family:monospace;color:#F59E0B;font-weight:800">'+p.id+'</span><span>'+p.n.split("—")[0].trim()+'</span><span style="color:#EF4444;font-size:10px">Sin fechas</span></div>'});h+='</div>'}
    h+='<div><div style="font-size:11px;font-weight:700;color:#F59E0B;margin-bottom:6px">📋 Recordatorios</div>';
    ["Reunión Torfresma con Tomás (ING-01)","Reunión barraca con Sergio (ING-23)","Política: no anticipos >100-150M, RFI/RFQ","Próxima reunión: mié 25/03",esN+" escalados — definir estado"].forEach(function(r){h+='<div style="font-size:11px;color:#94A3B8;padding:2px 0">→ '+r+'</div>'});h+='</div>';
  }
  h+='<div style="margin-top:16px;text-align:center;font-size:9px;color:#334155">DEVESA v5.1 · '+LM+'</div>';
  return h;
}
